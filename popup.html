<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HDRezka Downloader</title>
    <style>
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 15px;
        }
        h2 {
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            color: #ff9800;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .quality-btn {
            display: block;
            width: 100%;
            background-color: #333;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            font-size: 14px;
            transition: all 0.2s ease;
            box-sizing: border-box;
            font-weight: 500;
        }
        .quality-btn:hover {
            background-color: #444;
        }
        .quality-btn.mp4-btn {
            background-color: #2e7d32;
            border-color: #2e7d32;
        }
        .quality-btn.mp4-btn:hover {
            background-color: #388e3c;
        }
        #no-links {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            line-height: 1.4;
            padding: 10px;
        }
        .refresh-msg {
            font-size: 12px;
            color: #777;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h2>HDRezka Downloader</h2>
    <div id="links-container">
        <p id="no-links">Видео не найдено.<br><br>Запустите или выберите серию в плеере на сайте, чтобы появились ссылки.</p>
    </div>
    <div class="refresh-msg">Если ссылки не появляются, обновите страницу.</div>
    <script src="popup.js"></script>
</body>
</html>
